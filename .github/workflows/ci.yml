name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Shell check + bats tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gettext-base shellcheck

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gettext shellcheck
          # macOS envsubst is keg-only, add to PATH
          echo "/opt/homebrew/opt/gettext/bin" >> $GITHUB_PATH

      - name: Install bats
        run: |
          npm install -g bats

      - name: Shell syntax check
        run: |
          for f in bin/project-init lib/*.sh install.sh; do
            echo "Checking $f..."
            sh -n "$f"
          done

      - name: Run shellcheck
        run: |
          shellcheck bin/project-init lib/*.sh install.sh

      - name: Run tests
        run: bats tests/
